services:
  # MongoDB Database with Replica Set
  mongodb:
    image: mongo:7.0
    container_name: goshala-mongodb
    restart: unless-stopped
    command: mongod --bind_ip_all
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: goshala123
      MONGO_INITDB_DATABASE: goshala
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init:/docker-entrypoint-initdb.d
    networks:
      - goshala-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MongoDB Replica Set Initializer
  mongo-setup:
    image: mongo:7.0
    container_name: goshala-mongo-setup
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./docker/init-replica-set.sh:/init-replica-set.sh
    networks:
      - goshala-network
    command: /init-replica-set.sh
    restart: "no"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: goshala-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - goshala-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goshala-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - goshala-network
    volumes:
      - ./public/uploads:/app/public/uploads

  # MongoDB Express (Optional - Database Admin UI)
  mongo-express:
    image: mongo-express:1.0.0
    container_name: goshala-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: goshala123
      ME_CONFIG_MONGODB_URL: mongodb://admin:goshala123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - goshala-network

  # Redis Commander (Optional - Redis Admin UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: goshala-redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - goshala-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  goshala-network:
    driver: bridge
